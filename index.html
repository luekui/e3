<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="E3">
  <title>E3</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --border: #252a38;
      --accent: #4fffb0;
      --accent-dim: rgba(79,255,176,0.12);
      --accent-glow: rgba(79,255,176,0.35);
      --text: #ffffff;
      --muted: #8b95b0;
      --danger: #ff6b6b;
      --orange: #ffaa4f;
      --orange-dim: rgba(255,170,79,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
      overscroll-behavior: none;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding: env(safe-area-inset-top,0px) env(safe-area-inset-right,0px) env(safe-area-inset-bottom,0px) env(safe-area-inset-left,0px);
    }

    /* UPDATE BANNER */
    #update-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--accent);
      color: #0f1117;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 500;
      transform: translateY(-100%);
      transition: transform 0.4s cubic-bezier(0.32,0.72,0,1);
    }
    #update-banner.show { transform: translateY(0); }
    #btn-update {
      background: #0f1117;
      color: var(--accent);
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
    }

    /* WARNING BANNER */
    #warn-banner {
      background: rgba(255,170,79,0.12);
      border-bottom: 1px solid rgba(255,170,79,0.4);
      color: var(--orange);
      font-size: 10px;
      letter-spacing: 1px;
      padding: 10px 16px;
      display: none;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    #warn-banner.show { display: flex; }
    #warn-text { flex: 1; line-height: 1.5; }
    #warn-close {
      font-size: 18px;
      color: var(--orange);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 2px;
      flex-shrink: 0;
    }

    /* STAMP BUTTON */
    #stamp-area {
      flex: 0 0 33%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
    }
    #stamp-area::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 60%, var(--accent-dim) 0%, transparent 70%);
      pointer-events: none;
      transition: opacity 0.3s;
      opacity: 0;
    }
    #stamp-area:active::before { opacity: 1; }
    #stamp-ring {
      width: 220px; height: 120px;
      border-radius: 16px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    #stamp-area:active #stamp-ring {
      border-color: var(--stamp-color, var(--accent));
      box-shadow: 0 0 40px var(--stamp-glow, var(--accent-glow)), inset 0 0 30px var(--stamp-dim, var(--accent-dim));
      transform: scale(0.94);
    }
    #stamp-inner {
      width: 196px; height: 96px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      transition: background 0.2s;
    }
    #stamp-area:active #stamp-inner { background: var(--accent-dim); }
    #live-time {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 1px;
    }
    #stamp-label {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 2px;
    }
    #stamp-ring::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 20px;
      border: 1px solid var(--stamp-color, var(--accent));
      opacity: 0;
      animation: pulse-ring 3s ease-out infinite;
    }
    @keyframes pulse-ring {
      0%   { transform: scale(0.92); opacity: 0.4; }
      60%  { transform: scale(1.08); opacity: 0; }
      100% { opacity: 0; }
    }
    #flash {
      position: fixed; inset: 0;
      background: var(--accent);
      opacity: 0; pointer-events: none; z-index: 100;
    }
    #flash.go { animation: flash-anim 0.35s ease-out forwards; }
    @keyframes flash-anim { 0% { opacity: 0.18; } 100% { opacity: 0; } }

    /* LIST AREA */
    #list-area {
      flex: 1 1 0;
      overflow-y: auto;
      padding: 12px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #list-area::-webkit-scrollbar { width: 3px; }
    #list-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* DATE NAV */
    #date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .nav-btn {
      width: 32px; height: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .nav-btn:active { color: var(--accent); border-color: var(--accent); }
    .nav-btn:disabled { opacity: 0.2; pointer-events: none; }
    #date-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    #list-date {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
    }
    #sync-status {
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #sync-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    #sync-dot.ok      { background: var(--accent); }
    #sync-dot.err     { background: var(--danger); }
    #sync-dot.syncing { animation: blink 0.6s infinite; }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

    /* PAIR BLOCKS */
    .pair-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      animation: slide-in 0.25s ease-out;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .pair-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px;
    }
    .pair-side {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .pair-side.right {
      flex-direction: row-reverse;
    }
    .pair-arrow {
      color: var(--border);
      font-size: 14px;
      flex-shrink: 0;
    }
    .pair-label {
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .pair-label.in   { color: var(--accent); }
    .pair-label.out  { color: var(--orange); }
    .pair-label.open { color: var(--muted); }
    .pair-time {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
    }
    .pair-time.in   { color: var(--accent); }
    .pair-time.out  { color: var(--orange); }
    .pair-time.open { color: var(--muted); font-size: 13px; font-family: 'DM Mono', monospace; font-weight: 300; }
    .pair-delete {
      width: 22px; height: 22px;
      border: none; background: none;
      color: var(--muted);
      font-size: 15px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      padding: 0; flex-shrink: 0;
    }
    .pair-delete:active { color: var(--danger); background: rgba(255,107,107,0.1); }
    .pair-duration-inline {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--muted);
      flex-shrink: 0;
      text-align: center;
      white-space: nowrap;
    }

    #total-bar {
      margin-top: 2px;
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
    }
    #total-bar span:last-child {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    #empty-msg {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 2px;
      margin-top: 24px;
    }

    /* BOTTOM BAR */
    #bottom-bar {
      flex: 0 0 auto;
      padding: 10px 20px 16px;
      border-top: 1px solid var(--border);
    }
    #btn-manual {
      width: 100%;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    #btn-manual:active { border-color: var(--accent); background: var(--accent-dim); }

    /* MODAL */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(10,12,18,0.85);
      display: flex; align-items: flex-end;
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    #modal-overlay.open { opacity: 1; pointer-events: all; }
    #modal {
      width: 100%;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      padding: 24px 24px 32px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
      display: flex; flex-direction: column; gap: 16px;
    }
    #modal-overlay.open #modal { transform: translateY(0); }
    #modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted);
    }
    #time-input {
      width: 100%; padding: 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 28px; font-weight: 700;
      text-align: center; outline: none;
      transition: border-color 0.2s;
    }
    #time-input:focus { border-color: var(--accent); }
    #modal-actions { display: flex; gap: 10px; }
    #btn-cancel {
      flex: 1; padding: 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 2px; cursor: pointer;
    }
    #btn-confirm {
      flex: 2; padding: 14px;
      background: var(--accent); border: none;
      border-radius: 8px;
      color: #0f1117;
      font-family: 'DM Mono', monospace;
      font-size: 11px; font-weight: 500;
      letter-spacing: 2px; cursor: pointer;
    }
    #btn-confirm:active { opacity: 0.8; }

    /* TOAST */
    #toast {
      position: fixed; bottom: 100px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 11px; letter-spacing: 1px;
      color: var(--muted);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      white-space: nowrap; z-index: 300;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="update-banner">
  <span>Neue Version verfügbar</span>
  <button id="btn-update">Aktualisieren</button>
</div>

<div id="warn-banner">
  <span id="warn-text"></span>
  <button id="warn-close">×</button>
</div>

<div id="flash"></div>
<div id="toast"></div>

<div id="app">
  <div id="stamp-area" role="button" aria-label="Jetzt stempeln">
    <div id="stamp-ring">
      <div id="stamp-inner">
        <div id="live-time">--:--:--</div>
        <div id="stamp-label">Tippen zum Stempeln</div>
      </div>
    </div>
  </div>

  <div id="list-area">
    <div id="date-nav">
      <button class="nav-btn" id="btn-prev">&#8249;</button>
      <div id="date-center">
        <div id="list-date">—</div>
        <div id="sync-status">
          <div id="sync-dot"></div>
          <span id="sync-text">—</span>
        </div>
      </div>
      <button class="nav-btn" id="btn-next">&#8250;</button>
    </div>
  </div>

  <div id="bottom-bar">
    <button id="btn-manual">+ Manuell erfassen</button>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <div id="modal-title">Manuelle Eingabe</div>
    <input type="time" id="time-input" step="60">
    <div id="modal-actions">
      <button id="btn-cancel">Abbrechen</button>
      <button id="btn-confirm">Speichern</button>
    </div>
  </div>
</div>

<script>
  const APP_VERSION = '1.8';

  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxUlX7V70TlrbLqLX1f2zd_BMMckO7_meiAMdD152k4ztzxNFPOD2ilfE9tDBgeGdqT/exec";

  let allDays    = [];  // [{date:"06.05.2026", stamps:["07:00:00",...]}, ...]
  let currentIdx = -1;
  let stamps     = [];

  // ── Helpers ──
  function todayStr() {
    const now = new Date();
    const d = String(now.getDate()).padStart(2,'0');
    const m = String(now.getMonth()+1).padStart(2,'0');
    const y = now.getFullYear();
    return `${d}.${m}.${y}`;
  }

  function formatDateLabel(dateStr) {
    const [d, m, y] = dateStr.split('.').map(Number);
    const dt = new Date(y, m-1, d);
    const days = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
    return days[dt.getDay()] + ', ' + dateStr;
  }

  function timeDiffMin(t1, t2) {
    const mins = t => { const [h,m] = t.split(':').map(Number); return h*60+m; };
    return mins(t2) - mins(t1);
  }

  function fmtDuration(min) {
    const h = Math.floor(min/60), m = min%60;
    return h > 0 ? `${h}h ${String(m).padStart(2,'0')}min` : `${m} min`;
  }

  // ── DOM ──
  const liveTimeEl   = document.getElementById('live-time');
  const listArea     = document.getElementById('list-area');
  const listDate     = document.getElementById('list-date');
  const syncDot      = document.getElementById('sync-dot');
  const syncText     = document.getElementById('sync-text');
  const stampArea    = document.getElementById('stamp-area');
  const flash        = document.getElementById('flash');
  const toast        = document.getElementById('toast');
  const modalOverlay = document.getElementById('modal-overlay');
  const timeInput    = document.getElementById('time-input');
  const btnManual    = document.getElementById('btn-manual');
  const btnCancel    = document.getElementById('btn-cancel');
  const btnConfirm   = document.getElementById('btn-confirm');
  const btnPrev      = document.getElementById('btn-prev');
  const btnNext      = document.getElementById('btn-next');
  const warnBanner   = document.getElementById('warn-banner');
  const warnText     = document.getElementById('warn-text');
  const warnClose    = document.getElementById('warn-close');

  // ── Clock ──
  setInterval(() => { liveTimeEl.textContent = new Date().toTimeString().slice(0,8); }, 500);
  liveTimeEl.textContent = new Date().toTimeString().slice(0,8);

  // ── Sync status ──
  function setSyncStatus(state, text) {
    syncDot.className = '';
    if (state) syncDot.classList.add(state);
    syncText.textContent = text;
  }

  // ── Render ──
  function renderList() {
    document.querySelectorAll('.pair-block, #total-bar, #empty-msg').forEach(e => e.remove());

    listDate.textContent = currentIdx >= 0 && allDays[currentIdx]
      ? formatDateLabel(allDays[currentIdx].date)
      : formatDateLabel(todayStr());

    btnPrev.disabled = currentIdx <= 0;
    btnNext.disabled = currentIdx >= allDays.length - 1;

    if (stamps.length === 0) {
      const msg = document.createElement('div');
      msg.id = 'empty-msg';
      msg.textContent = 'Noch keine Stempelungen';
      listArea.appendChild(msg);
      return;
    }

    let totalMin = 0;

    for (let i = 0; i < stamps.length; i += 2) {
      const inT        = stamps[i];
      const outT       = stamps[i+1] || null;
      const inDisplay  = inT.slice(0,5);
      const outDisplay = outT ? outT.slice(0,5) : null;

      const block = document.createElement('div');
      block.className = 'pair-block';

      if (outT) {
        const dur = timeDiffMin(inT, outT);
        totalMin += dur;
        block.innerHTML = `
          <div class="pair-row">
            <div class="pair-side">
              <span class="pair-label in">IN</span>
              <span class="pair-time in">${inDisplay}</span>
              <button class="pair-delete" data-index="${i}">×</button>
            </div>
            <div class="pair-duration-inline">⏱ ${fmtDuration(dur)}</div>
            <div class="pair-side right">
              <span class="pair-label out">OUT</span>
              <span class="pair-time out">${outDisplay}</span>
              <button class="pair-delete" data-index="${i+1}">×</button>
            </div>
          </div>`;
      } else {
        block.innerHTML = `
          <div class="pair-row">
            <div class="pair-side">
              <span class="pair-label in">IN</span>
              <span class="pair-time in">${inDisplay}</span>
              <button class="pair-delete" data-index="${i}">×</button>
            </div>
            <div class="pair-arrow">→</div>
            <div class="pair-side right">
              <span class="pair-label open">OUT</span>
            </div>
          </div>`;
      }

      listArea.appendChild(block);
    }

    // Offener Block: laufende Zeit dazurechnen
    const hasOpenBlock = stamps.length % 2 !== 0;
    if (hasOpenBlock) {
      const lastIn = stamps[stamps.length - 1];
      const nowStr = new Date().toTimeString().slice(0, 8);
      totalMin += timeDiffMin(lastIn, nowStr);
    }

    if (stamps.length > 0) {
      const bar = document.createElement('div');
      bar.id = 'total-bar';
      bar.innerHTML = `<span>TOTAL${hasOpenBlock ? ' ▸' : ''}</span><span id="total-val">${fmtDuration(totalMin)}</span>`;
      listArea.appendChild(bar);
    }

    listArea.scrollTop = listArea.scrollHeight;

    // Farbe des Stempel-Buttons anpassen
    updateStampColor();

    // Live-Update des Totals wenn offener Block
    clearInterval(window._totalTimer);
    if (hasOpenBlock) {
      window._totalTimer = setInterval(() => {
        const el = document.getElementById('total-val');
        if (!el) { clearInterval(window._totalTimer); return; }
        const lastIn = stamps[stamps.length - 1];
        const nowStr = new Date().toTimeString().slice(0, 8);
        const live = totalMin - timeDiffMin(lastIn, new Date().toTimeString().slice(0,8));
        // Neuberechnung
        let t = 0;
        for (let i = 0; i < stamps.length - 1; i += 2) {
          t += timeDiffMin(stamps[i], stamps[i+1]);
        }
        t += timeDiffMin(lastIn, new Date().toTimeString().slice(0, 8));
        el.textContent = fmtDuration(t);
      }, 30000); // alle 30 Sekunden
    }
  }

  // ── Stempel-Button Farbe ──
  function updateStampColor() {
    const isOut = stamps.length % 2 !== 0;
    const color = isOut ? 'var(--orange)' : 'var(--accent)';
    const glow  = isOut ? 'rgba(255,170,79,0.35)' : 'var(--accent-glow)';
    const dim   = isOut ? 'rgba(255,170,79,0.12)' : 'var(--accent-dim)';
    document.getElementById('live-time').style.color = color;
    // Update CSS variables for pulse ring and glow
    document.documentElement.style.setProperty('--stamp-color', color);
    document.documentElement.style.setProperty('--stamp-glow', glow);
    document.documentElement.style.setProperty('--stamp-dim', dim);
  }

  // ── Load all ──
  async function loadAll() {
    setSyncStatus('syncing', 'Laden…');
    try {
      const res  = await fetch(`${SCRIPT_URL}?action=all`);
      const data = await res.json();
      allDays = data.days || [];
      const today = todayStr();
      let idx = allDays.findIndex(d => d.date === today);
      if (idx < 0) {
        allDays.push({ date: today, stamps: [] });
        idx = allDays.length - 1;
      }
      currentIdx = idx;
      stamps = allDays[currentIdx].stamps;
      renderList();
      setSyncStatus('ok', 'Synchronisiert');
      checkWarn();
    } catch(e) {
      setSyncStatus('err', 'Offline');
      showToast('Konnte nicht laden – offline?');
    }
  }

  // ── Warn: last past day odd count ──
  function checkWarn() {
    const today = todayStr();
    const past = allDays.filter(d => d.date !== today);
    if (!past.length) return;
    const last = past[past.length - 1];
    if (last.stamps.length % 2 !== 0) {
      warnText.textContent = '⚠ ' + formatDateLabel(last.date) + ': ungerade Anzahl Stempelungen';
      warnBanner.classList.add('show');
      warnBanner.onclick = (e) => {
        if (e.target === warnClose) return;
        const idx = allDays.findIndex(d => d.date === last.date);
        if (idx >= 0) navigateTo(idx);
      };
    }
  }

  warnClose.addEventListener('click', (e) => {
    e.stopPropagation();
    warnBanner.classList.remove('show');
  });

  // ── Navigate ──
  function navigateTo(idx) {
    if (idx < 0 || idx >= allDays.length) return;
    currentIdx = idx;
    stamps = allDays[currentIdx].stamps;
    renderList();
  }
  btnPrev.addEventListener('click', () => navigateTo(currentIdx - 1));
  btnNext.addEventListener('click', () => navigateTo(currentIdx + 1));

  // ── Stamp (always today) ──
  function doStamp(timeStr) {
    const today = todayStr();
    let idx = allDays.findIndex(d => d.date === today);
    if (idx < 0) { allDays.push({ date: today, stamps: [] }); idx = allDays.length - 1; }
    allDays[idx].stamps.push(timeStr);
    allDays[idx].stamps.sort();
    currentIdx = idx;
    stamps = allDays[currentIdx].stamps;
    renderList();
    flashScreen();
    sendStamp(timeStr);
  }

  stampArea.addEventListener('click', () => {
    doStamp(new Date().toTimeString().slice(0,8));
  });

  function flashScreen() {
    flash.classList.remove('go');
    void flash.offsetWidth;
    flash.classList.add('go');
  }

  // ── Send / Save ──
  async function sendStamp(timeStr) {
    setSyncStatus('syncing', 'Speichern…');
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ time: timeStr }),
        headers: { 'Content-Type': 'text/plain' }
      });
      setSyncStatus('ok', 'Gespeichert');
    } catch(e) {
      setSyncStatus('err', 'Fehler');
      showToast('Fehler beim Speichern');
    }
  }

  async function reSaveDay(dateStr, stampsArr) {
    setSyncStatus('syncing', 'Aktualisieren…');
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ time: '__REPLACE__', date: dateStr, stamps: stampsArr.join(';') }),
        headers: { 'Content-Type': 'text/plain' }
      });
      setSyncStatus('ok', 'Gespeichert');
    } catch(e) {
      setSyncStatus('err', 'Sync-Fehler');
    }
  }

  // ── Delete ──
  listArea.addEventListener('click', async (e) => {
    const btn = e.target.closest('.pair-delete');
    if (!btn) return;
    const idx = parseInt(btn.dataset.index);
    const dateStr = allDays[currentIdx].date;
    allDays[currentIdx].stamps.splice(idx, 1);
    stamps = allDays[currentIdx].stamps;
    renderList();
    await reSaveDay(dateStr, stamps);
  });

  // ── Manual modal ──
  btnManual.addEventListener('click', () => {
    timeInput.value = new Date().toTimeString().slice(0,5);
    modalOverlay.classList.add('open');
    setTimeout(() => timeInput.focus(), 350);
  });
  btnCancel.addEventListener('click', () => modalOverlay.classList.remove('open'));
  modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove('open'); });
  btnConfirm.addEventListener('click', () => {
    const val = timeInput.value;
    if (!val) return;
    modalOverlay.classList.remove('open');
    const timeStr = val + ':00';
    // Manuell: immer auf den aktuell angezeigten Tag
    const dateStr = allDays[currentIdx].date;
    allDays[currentIdx].stamps.push(timeStr);
    allDays[currentIdx].stamps.sort();
    stamps = allDays[currentIdx].stamps;
    renderList();
    flashScreen();
    reSaveDay(dateStr, stamps);
  });

  // ── Toast ──
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ── Service Worker ──
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('./sw.js?v=1.8').then(function(reg) {
        reg.update();
        reg.addEventListener('updatefound', function() {
          var nw = reg.installing;
          nw.addEventListener('statechange', function() {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              showUpdateBanner(nw);
            }
          });
        });
        if (reg.waiting) showUpdateBanner(reg.waiting);
        setTimeout(function() {
          reg.update().then(function() { if (reg.waiting) showUpdateBanner(reg.waiting); });
        }, 2000);
      }).catch(function(err) { console.log('SW:', err); });
      var reloading = false;
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (!reloading) { reloading = true; window.location.reload(); }
      });
    });
  }

  // ── Version-Check: beim Start prüfen ob neue Version auf Server ──
  function showUpdateBanner(worker) {
    document.getElementById('update-banner').classList.add('show');
    window._pendingWorker = worker;
  }

  function checkVersion() {
    fetch('./index.html?nocache=' + Date.now())
      .then(function(r) { return r.text(); })
      .then(function(html) {
        var m = html.match(/APP_VERSION = '([^']+)'/);
        if (m && m[1] !== APP_VERSION) {
          document.getElementById('update-banner').classList.add('show');
        }
      }).catch(function(){});
  }
  setTimeout(checkVersion, 3000);

  document.getElementById('btn-update').addEventListener('click', function() {
    if (window._pendingWorker) {
      window._pendingWorker.postMessage({type: 'SKIP_WAITING'});
    }
    setTimeout(function() { window.location.reload(true); }, 300);
  });

  // ── Init ──
  loadAll();
</script>
</body>
</html>
